    <path d="M 16 512 L 16 440 Q 160 410 280 460 T 496 410 L 496 512 Z" fill="url(#sandGold)"/>

    <circle cx="200" cy="220" r="36" fill="url(#bubbleGrad)" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4"/>
    <circle cx="188" cy="208" r="8" fill="#ffffff" opacity="0.4"/> <circle cx="340" cy="150" r="24" fill="url(#bubbleGrad)" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.4"/>
    <circle cx="332" cy="142" r="5" fill="#ffffff" opacity="0.4"/>

    <circle cx="120" cy="300" r="16" fill="url(#bubbleGrad)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.3"/>
    
    <circle cx="400" cy="320" r="20" fill="url(#bubbleGrad)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.3"/>

    <circle cx="100" cy="120" r="3" fill="#f3e5ab" opacity="0.6"/>
    <circle cx="420" cy="220" r="2.5" fill="#d4af37" opacity="0.5"/>
    <circle cx="280" cy="80" r="4" fill="#ffffff" opacity="0.7"/>
    <circle cx="250" cy="280" r="2" fill="#d4af37" opacity="0.4"/>
    <circle cx="70" cy="240" r="3.5" fill="#e6cfac" opacity="0.5"/>
