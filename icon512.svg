<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f15"/>
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aa802c"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#f3e5ab"/>
    </linearGradient>

    <linearGradient id="lightRay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </linearGradient>

    <linearGradient id="sandGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e6cfac"/>
      <stop offset="30%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#7a5f13"/>
    </linearGradient>

    <linearGradient id="sandWhite" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>

    <linearGradient id="sandBrown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#966a38"/>
      <stop offset="100%" stop-color="#3e2510"/>
    </linearGradient>

    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0.3"/>
    </linearGradient>

    <clipPath id="iconClip">
      <rect x="16" y="16" width="480" height="480" rx="96" ry="96" />
    </clipPath>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="6" stroke-alignment="inner"/>

  <g clip-path="url(#iconClip)">
    <rect x="0" y="0" width="512" height="512" fill="url(#lightRay)"/>

