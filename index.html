<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サンドピクチャー・シミュレーター</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121214">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        body {
            background-color: #121214;
            color: #e0e0e0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #canvas-container {
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 4px 12px rgba(0,0,0,0.5);
            padding: 26px 18px 18px;
            position: relative;
            background:
                repeating-linear-gradient(
                    90deg,
                    transparent 0, transparent 5px,
                    rgba(0,0,0,0.012) 5px, rgba(0,0,0,0.012) 6px
                ),
                repeating-linear-gradient(
                    87deg,
                    transparent 0, transparent 18px,
                    rgba(255,255,255,0.01) 18px, rgba(255,255,255,0.01) 19px
                ),
                repeating-linear-gradient(
                    93deg,
                    transparent 0, transparent 30px,
                    rgba(0,0,0,0.018) 30px, rgba(0,0,0,0.018) 32px
                ),
                linear-gradient(
                    160deg,
                    #5a3418 0%, #3a2010 20%, #6b4020 38%,
                    #2e1808 52%, #523018 68%, #3a2010 82%, #5a3418 100%
                );
        }
        #frame-title {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            letter-spacing: 5px;
            font-weight: 600;
            color: #1e0c04;
            text-shadow: 0 1px 1px rgba(180,120,50,0.3), 0 -1px 0 rgba(0,0,0,0.4);
            pointer-events: none;
            z-index: 5;
        }
        canvas {
            display: block;
            filter: blur(0.5px) contrast(1.05);
        }
        #fps-counter {
            position: absolute;
            bottom: 6px;
            right: 8px;
            color: rgba(255,255,255,0.18);
            font-family: 'Courier New', Courier, monospace;
            font-size: 10px;
            font-weight: normal;
            z-index: 10;
            pointer-events: none;
        }
        .controls {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
        }
        button {
            background: linear-gradient(160deg, #2e2420, #1c1410);
            color: #a09070;
            border: 1px solid #3a2e24;
            padding: 6px 10px;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 1px;
            border-radius: 3px;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }
        button:hover {
            border-color: #8a7050;
            color: #c8b090;
        }
        button:active {
            transform: translateY(1px);
        }
        button:disabled {
            opacity: 0.3;
            cursor: default;
        }

        /* 全画面ボタン（フレーム彫り込み） */
        #fullscreenBtn {
            position: absolute;
            top: 0;
            right: 14px;
            height: 26px;
            padding: 0;
            background: transparent;
            border: none;
            box-shadow: none;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #1e0c04;
            text-shadow: 0 1px 1px rgba(180,120,50,0.3), 0 -1px 0 rgba(0,0,0,0.4);
            cursor: pointer;
            z-index: 10;
            transition: text-shadow 0.2s;
        }
        #fullscreenBtn:hover {
            background: transparent;
            border: none;
            box-shadow: none;
            text-shadow: 0 1px 2px rgba(200,150,70,0.5), 0 -1px 0 rgba(0,0,0,0.5);
            color: #2a1206;
        }

        /* 全画面モード */
        body.fs-mode {
            justify-content: center;
            align-items: center;
        }
        body.fs-mode #canvas-container {
            transform-origin: center center;
        }
        body.fs-mode .controls,
        body.fs-mode #coin-display {
            display: none;
        }

        /* 洗練された設定画面（モーダル）のスタイル */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 8, 7, 0.75);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-wrapper {
            background: linear-gradient(145deg, #231c18, #16110e);
            border: 1px solid #d4af37;
            border-radius: 12px;
            padding: 25px;
            width: 85%;
            max-width: 340px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(212, 175, 55, 0.05);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-wrapper {
            transform: scale(1);
        }
        .modal-title {
            font-size: 1.1rem;
            color: #d4af37;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 2px;
            border-bottom: 1px solid #3a2e26;
            padding-bottom: 10px;
        }
        .modal-content {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .param-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: #cbd5e1;
            letter-spacing: 0.5px;
        }
        .param-group select {
            background: #120d0b;
            color: #d4af37;
            border: 1px solid #5c4a3e;
            border-radius: 4px;
            padding: 6px 10px;
            width: 120px;
            text-align-last: center;
            font-weight: bold;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .param-group select:focus {
            border-color: #d4af37;
        }
        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .slider-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: #cbd5e1;
            letter-spacing: 0.5px;
        }
        .slider-row label {
            min-width: 100px;
        }
        .slider-row .slider-val {
            color: #d4af37;
            font-weight: bold;
            min-width: 30px;
            text-align: right;
        }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 130px;
            height: 4px;
            border-radius: 2px;
            background: #5c4a3e;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #d4af37;
            cursor: pointer;
            box-shadow: 0 0 4px rgba(212, 175, 55, 0.5);
        }
        .modal-actions {
            margin-top: 25px;
            display: flex;
            justify-content: center;
        }
        .close-btn {
            background: linear-gradient(135deg, #5c4a3e, #4a3b32);
            color: #f5e6d3;
            border: 1px solid #7a6556;
            width: 100%;
            padding: 10px;
            font-weight: bold;
            border-radius: 6px;
        }
        .close-btn:hover {
            background: linear-gradient(135deg, #6e594b, #5c4a3e);
            border-color: #d4af37;
        }

        /* コイン表示 */
        #coin-display {
            font-size: 13px;
            color: #d4af37;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        #coin-display span {
            font-size: 16px;
            font-weight: bold;
        }

        /* ストアモーダル */
        .store-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 14px;
        }
        .store-tab {
            flex: 1;
            background: #1a1512;
            color: #776e65;
            border: 1px solid #3a2e26;
            padding: 6px 2px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .store-tab.active {
            background: #3a2e26;
            color: #d4af37;
            border-color: #d4af37;
        }
        .store-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            min-height: 140px;
        }
        .store-item {
            background: #1a1512;
            border: 1px solid #3a2e26;
            border-radius: 6px;
            padding: 10px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            color: #5c4a3e;
            letter-spacing: 0.5px;
        }
        .store-item .item-swatch {
            width: 44px;
            height: 28px;
            border-radius: 4px;
            border: 1px solid #3a2e26;
        }
        .store-item .item-icon {
            font-size: 22px;
            filter: grayscale(1) opacity(0.3);
        }
        .store-item .item-price {
            color: #776e65;
            font-size: 10px;
        }
        .store-item.owned {
            border-color: #5c4a3e;
            color: #a09080;
        }
        .store-item.active {
            border-color: #d4af37;
            color: #d4af37;
            box-shadow: 0 0 8px rgba(212,175,55,0.2);
        }
        .store-item button {
            margin-top: 2px;
            padding: 3px 8px;
            font-size: 10px;
            border-radius: 3px;
            letter-spacing: 0.5px;
        }

        /* 広告モーダル */
        #ad-placeholder {
            background: #0a0808;
            border: 1px dashed #3a2e26;
            border-radius: 8px;
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #5c4a3e;
            font-size: 12px;
            gap: 10px;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        #ad-countdown {
            font-size: 32px;
            font-weight: bold;
            color: #d4af37;
        }
        #ad-reward-msg {
            font-size: 14px;
            color: #d4af37;
            text-align: center;
            letter-spacing: 1px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="coin-display">🪙 <span id="coin-count">0</span> コイン</div>
    <div id="canvas-container">
        <div id="frame-title">SAND PICTURE</div>
        <button id="fullscreenBtn">全画面</button>
        <div id="fps-counter">FPS: --</div>
        <canvas id="sandCanvas"></canvas>
    </div>
    
    <div class="controls">
        <button id="flipBtn">反転</button>
        <button id="resetBtn">泡を再配置</button>
        <button id="openSettingsBtn">設定</button>
        <button id="adBtn">広告を見る</button>
        <button id="openStoreBtn">ストア</button>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-wrapper">
            <h2 class="modal-title">SETTINGS</h2>
            <div class="modal-content">
                <div class="slider-group">
                    <div class="slider-row">
                        <label for="bubbleCount">泡の数</label>
                        <input type="range" id="bubbleCount" value="40" min="0" max="200">
                        <span class="slider-val" id="bubbleCountVal">40</span>
                    </div>
                    <div class="slider-row">
                        <label for="sandScale">粒サイズ</label>
                        <input type="range" id="sandScale" value="1" min="1" max="5">
                        <span class="slider-val" id="sandScaleVal">1</span>
                    </div>
                </div>
                <div class="param-group">
                    <label>画面のボカシ効果</label>
                    <button id="blurToggleBtn" style="padding: 6px 12px; min-width: 90px;">ボカシ: ON</button>
                </div>
                <div class="param-group">
                    <label>スマート傾き検知</label>
                    <button id="tiltToggleBtn" style="padding: 6px 12px; min-width: 90px;">検知: OFF</button>
                </div>
                <div class="param-group">
                    <label>色彩による重さの差</label>
                    <button id="weightToggleBtn" style="padding: 6px 12px; min-width: 90px;">重さ: ON</button>
                </div>
                <div class="param-group">
                    <label>FPS表示</label>
                    <button id="fpsToggleBtn" style="padding: 6px 12px; min-width: 90px;">FPS: OFF</button>
                </div>
                <div class="param-group">
                    <label>アプリを最新版に</label>
                    <button id="updateBtn" style="padding: 6px 12px; min-width: 90px;">更新する</button>
                </div>
            </div>
            <div class="modal-actions">
                <button class="close-btn" id="closeSettingsBtn">設定を閉じる</button>
            </div>
            <p style="text-align:center; margin:12px 0 0; font-size:11px; color:#5c4a3e; letter-spacing:1px;">Ver 1.00</p>
        </div>
    </div>

    <!-- 広告モーダル -->
    <div class="modal-overlay" id="adModal">
        <div class="modal-wrapper">
            <h2 class="modal-title">広告</h2>
            <div id="ad-placeholder">
                <div style="font-size:11px;">広告スペース</div>
                <div id="ad-countdown">5</div>
            </div>
            <div id="ad-reward-msg">🪙 ＋5コイン獲得！</div>
            <div class="modal-actions">
                <button class="close-btn" id="adCloseBtn" disabled>しばらくお待ちください</button>
            </div>
        </div>
    </div>

    <!-- ストアモーダル -->
    <div class="modal-overlay" id="storeModal">
        <div class="modal-wrapper" style="max-width:360px;">
            <h2 class="modal-title" style="display:flex;justify-content:space-between;align-items:center;">
                <span>STORE</span>
                <span style="font-size:13px;letter-spacing:1px;">🪙 <span id="store-coin-count">0</span></span>
            </h2>
            <div class="store-tabs">
                <button class="store-tab active" data-tab="sand">砂の色</button>
                <button class="store-tab" data-tab="bg">壁紙</button>
                <button class="store-tab" data-tab="tank">水槽</button>
                <button class="store-tab" data-tab="bgm">BGM</button>
            </div>
            <div class="store-grid" id="store-grid"></div>
            <div class="modal-actions" style="margin-top:16px;">
                <button class="close-btn" id="closeStoreBtn">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('sandCanvas');
        const ctx = canvas.getContext('2d');

        let SCALE = 1; 
        let COLS, ROWS;
        let grid;
        let precomputedNoise;
        let precomputedSparkle;

        let tiltEnabled = false;
        let tiltX = 0;
        let weightDifferenceEnabled = true;
        let fpsVisible = false;
        let isBlurOn = true;

        function saveSettings() {
            const s = {
                bubbleCount: document.getElementById('bubbleCount').value,
                sandScale: document.getElementById('sandScale').value,
                blur: isBlurOn,
                weight: weightDifferenceEnabled,
                fps: fpsVisible
            };
            localStorage.setItem('sandpicture_settings', JSON.stringify(s));
        }

        function loadSettings() {
            const raw = localStorage.getItem('sandpicture_settings');
            if (!raw) return;
            try {
                const s = JSON.parse(raw);
                if (s.bubbleCount != null) {
                    document.getElementById('bubbleCount').value = s.bubbleCount;
                    document.getElementById('bubbleCountVal').textContent = s.bubbleCount;
                }
                if (s.sandScale != null) {
                    document.getElementById('sandScale').value = s.sandScale;
                    document.getElementById('sandScaleVal').textContent = s.sandScale;
                }
                if (s.blur != null) isBlurOn = s.blur;
                if (s.weight != null) weightDifferenceEnabled = s.weight;
                if (s.fps != null) fpsVisible = s.fps;
            } catch(e) {}
        }

        function setupSimulation() {
            let level = parseInt(document.getElementById('sandScale').value) || 3;
            if (level < 1) level = 1;
            if (level > 5) level = 5;

            if (level === 1) {
                SCALE = 0.5;
                canvas.width = 600;
                canvas.height = 800;
            } else if (level === 2) {
                SCALE = 0.707;
                canvas.width = 424;
                canvas.height = 565;
            } else if (level === 3) {
                SCALE = 1;
                canvas.width = 300;
                canvas.height = 400;
            } else if (level === 4) {
                SCALE = 2;
                canvas.width = 150;
                canvas.height = 200;
            } else if (level === 5) {
                SCALE = 4;
                canvas.width = 75;
                canvas.height = 100;
            }

            canvas.style.width = "300px";
            canvas.style.height = "400px";

            COLS = canvas.width;
            ROWS = canvas.height;
            const SIZE = ROWS * COLS;

            grid = new Uint8Array(SIZE);
            moved = new Uint8Array(SIZE);

            precomputedNoise = new Float32Array(SIZE);
            precomputedSparkle = new Float32Array(SIZE);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const i = r * COLS + c;
                    let u = Math.sin(r * 12.9898 + c * 78.233) * 43758.5453;
                    precomputedNoise[i] = (u - Math.floor(u)) * 14 - 7;
                    precomputedSparkle[i] = Math.abs((Math.sin(c * 123.4 + r * 567.8) * 9999) % 1);
                }
            }
        }

        const SAND_COLORS = {
            desert:   { name: '砂漠',   price: 0,  colors: [[212,175,55],[244,244,240],[112,76,45],[205,127,50]] },
            ocean:    { name: '深海',   price: 20, colors: [[80,180,220],[180,230,245],[20,60,120],[60,130,200]] },
            sakura:   { name: '桜',     price: 20, colors: [[240,150,175],[255,220,230],[180,70,110],[220,120,155]] },
            jade:     { name: '翡翠',   price: 20, colors: [[100,200,130],[200,240,210],[30,100,60],[70,155,100]] },
            lava:     { name: '溶岩',   price: 20, colors: [[240,80,20],[255,200,50],[140,20,0],[210,110,10]] },
            amethyst: { name: '紫水晶', price: 20, colors: [[180,100,240],[220,190,255],[80,20,150],[140,60,200]] },
            silver:   { name: '白銀',   price: 20, colors: [[210,215,225],[240,242,245],[120,125,140],[175,180,195]] },
            obsidian: { name: '黒曜石', price: 20, colors: [[80,80,95],[140,140,155],[25,25,35],[100,95,115]] },
            lemon:    { name: 'レモン', price: 20, colors: [[240,230,50],[255,248,180],[160,140,10],[210,195,40]] },
        };

        let rgbPatches = {
            2: { r: 212, g: 175, b: 55 },
            3: { r: 244, g: 244, b: 240 },
            4: { r: 112, g: 76,  b: 45 },
            5: { r: 205, g: 127, b: 50 }
        };

        function applySandColors(key) {
            const c = SAND_COLORS[key].colors;
            rgbPatches[2] = { r: c[0][0], g: c[0][1], b: c[0][2] };
            rgbPatches[3] = { r: c[1][0], g: c[1][1], b: c[1][2] };
            rgbPatches[4] = { r: c[2][0], g: c[2][1], b: c[2][2] };
            rgbPatches[5] = { r: c[3][0], g: c[3][1], b: c[3][2] };
            localStorage.setItem('sandpicture_active_sand', key);
        }

        let bubbles = [];

        let lastTime = performance.now();
        let frameCount = 0;
        const fpsEl = document.getElementById('fps-counter');

        function initBubbles() {
            const size = ROWS * COLS;
            for (let i = 0; i < size; i++) {
                if (grid[i] === 1) grid[i] = 0;
            }
            syncGridObstacles();
        }

        function syncGridObstacles() {
            const numBubbles = parseInt(document.getElementById('bubbleCount').value) || 0;
            for (let i = 0; i < numBubbles; i++) {
                let bx = Math.floor(Math.random() * COLS);
                let by = Math.floor(ROWS * 0.22 + Math.random() * (ROWS * 0.12));
                let br = Math.max(1, Math.floor((4 + Math.random() * 5) / SCALE));
                const rMin = Math.max(0, by - br), rMax = Math.min(ROWS - 1, by + br);
                const cMin = Math.max(0, bx - br), cMax = Math.min(COLS - 1, bx + br);
                for (let r = rMin; r <= rMax; r++) {
                    for (let c = cMin; c <= cMax; c++) {
                        if ((c-bx)*(c-bx) + (r-by)*(r-by) <= br*br) {
                            const idx = r * COLS + c;
                            if (grid[idx] === 0) grid[idx] = 1;
                        }
                    }
                }
            }
        }

        function initSand() {
            const sandRows = Math.floor(ROWS * 0.225);
            for (let r = 0; r < sandRows; r++) {
                const base = r * COLS;
                for (let c = 0; c < COLS; c++) {
                    if (Math.random() < 0.9) {
                        const rand = Math.random();
                        grid[base + c] = rand < 0.25 ? 2 : rand < 0.50 ? 3 : rand < 0.80 ? 4 : 5;
                    }
                }
            }
        }

        function countNeighbors(r, c) {
            let count = 0;
            const base = r * COLS + c;
            if (r > 0) {
                if (c > 0 && grid[base - COLS - 1] === 1) count++;
                if (grid[base - COLS] === 1) count++;
                if (c < COLS - 1 && grid[base - COLS + 1] === 1) count++;
            }
            if (c > 0 && grid[base - 1] === 1) count++;
            if (c < COLS - 1 && grid[base + 1] === 1) count++;
            if (r < ROWS - 1) {
                if (c > 0 && grid[base + COLS - 1] === 1) count++;
                if (grid[base + COLS] === 1) count++;
                if (c < COLS - 1 && grid[base + COLS + 1] === 1) count++;
            }
            return count;
        }

        const BUBBLE_DIRS = [
            {dr: -1, dc: 0, weight: 3.0},
            {dr: -1, dc: -1, weight: 2.0},
            {dr: -1, dc: 1, weight: 2.0},
            {dr: 0, dc: -1, weight: 1.0},
            {dr: 0, dc: 1, weight: 1.0},
            {dr: 1, dc: -1, weight: 0.5},
            {dr: 1, dc: 1, weight: 0.5}
        ];

        let flipX = false;
        function update() {
            moved.fill(0);
            flipX = !flipX;

            for (let r = ROWS - 1; r >= 0; r--) {
                const rOff = r * COLS;
                const r1Off = (r + 1) * COLS;
                for (let i = 0; i < COLS; i++) {
                    const c = flipX ? i : (COLS - 1 - i);
                    const rc = rOff + c;

                    if (moved[rc]) continue;
                    const type = grid[rc];

                    if (type >= 2) {
                        const hasUpperSand = (r > 0 && grid[rOff - COLS + c] >= 2);
                        let moveChance = hasUpperSand ? 0.9 : 0.25;

                        if (weightDifferenceEnabled) {
                            if (type === 2) moveChance = hasUpperSand ? 0.98 : 0.40;
                            else if (type === 4) moveChance = hasUpperSand ? 0.90 : 0.25;
                            else if (type === 5) moveChance = hasUpperSand ? 0.82 : 0.20;
                            else if (type === 3) moveChance = hasUpperSand ? 0.60 : 0.08;
                        }

                        if (Math.random() > moveChance) continue;

                        if (tiltEnabled && Math.abs(tiltX) > 0.15 && Math.random() < Math.abs(tiltX) * 0.85) {
                            const dir = tiltX > 0 ? 1 : -1;
                            const targetC = c + dir;
                            if (r + 1 < ROWS && targetC >= 0 && targetC < COLS) {
                                const r1tc = r1Off + targetC;
                                const target = grid[r1tc];
                                if (target === 0) {
                                    grid[r1tc] = type; grid[rc] = 0; moved[r1tc] = 1;
                                    continue;
                                } else if (target === 1 && Math.random() < (hasUpperSand ? 0.012 : 0.002)) {
                                    grid[r1tc] = type; grid[rc] = 1; moved[r1tc] = 1; moved[rc] = 1;
                                    continue;
                                }
                            }
                        }

                        if (r + 1 < ROWS) {
                            const r1c = r1Off + c;
                            const target = grid[r1c];
                            if (target === 0) {
                                grid[r1c] = type; grid[rc] = 0; moved[r1c] = 1;
                                continue;
                            } else if (target === 1 && Math.random() < (hasUpperSand ? 0.012 : 0.002)) {
                                grid[r1c] = type; grid[rc] = 1; moved[r1c] = 1; moved[rc] = 1;
                                continue;
                            }

                            if (Math.random() > 0.2) continue;

                            const leftC = c - 1, rightC = c + 1;
                            const gl = leftC >= 0 ? grid[r1Off + leftC] : -1;
                            const gr = rightC < COLS ? grid[r1Off + rightC] : -1;
                            const leftEmpty  = gl === 0 || (gl === 1 && Math.random() < 0.002);
                            const rightEmpty = gr === 0 || (gr === 1 && Math.random() < 0.002);

                            if (leftEmpty && rightEmpty) {
                                let dir = Math.random() < 0.5 ? -1 : 1;
                                if (tiltEnabled && Math.abs(tiltX) > 0.1) dir = tiltX > 0 ? 1 : -1;
                                const tc = c + dir;
                                const r1tc = r1Off + tc;
                                const tt = grid[r1tc];
                                grid[r1tc] = type; grid[rc] = tt; moved[r1tc] = 1;
                                if (tt === 1) moved[rc] = 1;
                            } else if (leftEmpty) {
                                const r1lc = r1Off + leftC;
                                const tt = grid[r1lc];
                                grid[r1lc] = type; grid[rc] = tt; moved[r1lc] = 1;
                                if (tt === 1) moved[rc] = 1;
                            } else if (rightEmpty) {
                                const r1rc = r1Off + rightC;
                                const tt = grid[r1rc];
                                grid[r1rc] = type; grid[rc] = tt; moved[r1rc] = 1;
                                if (tt === 1) moved[rc] = 1;
                            }
                        }

                    } else if (type === 1) {
                        if (Math.random() > 0.6) continue;

                        let bestIdx = -1, bestScore = -Infinity;
                        for (let d = 0; d < BUBBLE_DIRS.length; d++) {
                            const bd = BUBBLE_DIRS[d];
                            const nr = r + bd.dr, nc = c + bd.dc;
                            if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
                            const ni = nr * COLS + nc;
                            if (moved[ni] || grid[ni] !== 0) continue;
                            const score = bd.weight + countNeighbors(nr, nc) * 1.5 + Math.random() * 0.5;
                            if (score > bestScore) { bestScore = score; bestIdx = ni; }
                        }

                        if (bestIdx >= 0) {
                            grid[bestIdx] = 1; grid[rc] = 0; moved[bestIdx] = 1;
                        }
                    }
                }
            }
        }

        const sandThickness = new Int32Array(600);
        let imgData = null;

        function draw() {
            if (!imgData || imgData.width !== canvas.width || imgData.height !== canvas.height) {
                imgData = ctx.createImageData(canvas.width, canvas.height);
            }
            const data = imgData.data;

            sandThickness.fill(0);

            for (let r = 0; r < ROWS; r++) {
                const rOff = r * COLS;
                for (let c = 0; c < COLS; c++) {
                    const gi = rOff + c;
                    const type = grid[gi];
                    const idx = gi * 4;

                    if (type <= 1) {
                        data[idx]     = 26;
                        data[idx + 1] = 26;
                        data[idx + 2] = 46;
                        data[idx + 3] = 255;
                        sandThickness[c] = 0;
                    } else {
                        const thickness = sandThickness[c]++;
                        const base = rgbPatches[type];
                        const noise = precomputedNoise[gi];

                        const isSurface  = r > 0 && grid[gi - COLS] < 2;
                        const isLeftOpen  = c > 0 && grid[gi - 1] < 2;
                        const isRightOpen = c < COLS - 1 && grid[gi + 1] < 2;

                        let lMod = 0;
                        if (isSurface)  lMod += 18 + noise;
                        if (isLeftOpen)  lMod += 10 + noise * 0.5;
                        if (isRightOpen) lMod -= 14 - noise * 0.3;
                        if (!isSurface && !isLeftOpen && !isRightOpen) lMod -= 6 + noise * 0.1;
                        lMod -= Math.min(20, thickness * 0.15);
                        if ((type === 2 || type === 5) && precomputedSparkle[gi] > 0.985) lMod += 28;

                        const factor = lMod * 2;
                        data[idx]     = Math.max(0, Math.min(255, base.r + factor));
                        data[idx + 1] = Math.max(0, Math.min(255, base.g + factor));
                        data[idx + 2] = Math.max(0, Math.min(255, base.b + factor));
                        data[idx + 3] = 255;
                    }
                }
            }

            ctx.putImageData(imgData, 0, 0);

            let glassGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            glassGrad.addColorStop(0, 'rgba(255, 255, 255, 0.06)');
            glassGrad.addColorStop(0.3, 'rgba(255, 255, 255, 0.02)');
            glassGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.0)');
            glassGrad.addColorStop(0.7, 'rgba(255, 255, 255, 0.01)');
            glassGrad.addColorStop(1, 'rgba(255, 255, 255, 0.04)');
            ctx.fillStyle = glassGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

        }

        function loop() {
            update();
            draw();
            frameCount++;

            const now = performance.now();
            if (now >= lastTime + 500) { 
                const fps = Math.round((frameCount * 1000) / (now - lastTime));
                fpsEl.textContent = `FPS: ${fps}`;
                frameCount = 0;
                lastTime = now;
            }

            requestAnimationFrame(loop);
        }

        function flip() {
            const newGrid = new Uint8Array(ROWS * COLS);
            for (let r = 0; r < ROWS; r++) {
                const rOff = r * COLS;
                const newROff = (ROWS - 1 - r) * COLS;
                for (let c = 0; c < COLS; c++) {
                    const type = grid[rOff + c];
                    if (type >= 2) newGrid[newROff + c] = type;
                }
            }
            grid = newGrid;
            syncGridObstacles();
        }

        document.getElementById('flipBtn').addEventListener('click', flip);
        document.getElementById('resetBtn').addEventListener('click', () => {
            initBubbles();
        });

        document.getElementById('blurToggleBtn').addEventListener('click', () => {
            isBlurOn = !isBlurOn;
            applyBlur();
            saveSettings();
        });

        document.getElementById('bubbleCount').addEventListener('input', (e) => {
            document.getElementById('bubbleCountVal').textContent = e.target.value;
            saveSettings();
        });

        document.getElementById('sandScale').addEventListener('input', (e) => {
            document.getElementById('sandScaleVal').textContent = e.target.value;
        });

        document.getElementById('sandScale').addEventListener('change', () => {
            setupSimulation();
            initBubbles();
            initSand();
            saveSettings();
        });

        document.getElementById('tiltToggleBtn').addEventListener('click', async () => {
            if (!tiltEnabled) {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permissionState = await DeviceOrientationEvent.requestPermission();
                        if (permissionState === 'granted') {
                            enableTilt();
                        } else {
                            alert('画面の傾き検知へのアクセスが拒否されました。');
                        }
                    } catch (error) {
                        console.error('モーションセンサーエラー:', error);
                    }
                } else {
                    enableTilt();
                }
            } else {
                disableTilt();
            }
        });

        function enableTilt() {
            tiltEnabled = true;
            document.getElementById('tiltToggleBtn').textContent = "検知: ON";
            window.addEventListener('deviceorientation', handleOrientation);
        }

        function disableTilt() {
            tiltEnabled = false;
            tiltX = 0;
            document.getElementById('tiltToggleBtn').textContent = "検知: OFF";
            window.removeEventListener('deviceorientation', handleOrientation);
        }

        function handleOrientation(event) {
            let gamma = event.gamma; 
            if (gamma !== null) {
                tiltX = Math.max(-1, Math.min(1, gamma / 30));
            }
        }

        let isInteracting = false;
        let lastCanvasX = null;
        let lastCanvasY = null;

        function applyTouchInfluence(e) {
            if (!isInteracting) return;
            
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const rect = canvas.getBoundingClientRect();
            const canvasX = Math.floor(((clientX - rect.left) / rect.width) * COLS);
            const canvasY = Math.floor(((clientY - rect.top) / rect.height) * ROWS);

            if (lastCanvasX !== null && lastCanvasY !== null) {
                let vx = canvasX - lastCanvasX;
                let vy = canvasY - lastCanvasY;
                
                if (vx !== 0 || vy !== 0) {
                    const speed = Math.sqrt(vx * vx + vy * vy);
                    const brushRadius = Math.max(4, Math.floor((8 + speed * 0.4) / SCALE));

                    let cellsToMove = [];
                    for (let r = Math.max(0, canvasY - brushRadius); r <= Math.min(ROWS - 1, canvasY + brushRadius); r++) {
                        for (let c = Math.max(0, canvasX - brushRadius); c <= Math.min(COLS - 1, canvasX + brushRadius); c++) {
                            if ((c - canvasX) * (c - canvasX) + (r - canvasY) * (r - canvasY) <= brushRadius * brushRadius) {
                                if (grid[r][c] > 0) {
                                    cellsToMove.push({ r: r, c: c, type: grid[r][c] });
                                }
                            }
                        }
                    }

                    cellsToMove.sort(() => Math.random() - 0.5);

                    for (let cell of cellsToMove) {
                        let moveDist = Math.min(6, Math.max(1, Math.floor(speed * 0.3)));
                        let dx = Math.round((vx / speed) * moveDist) + (Math.floor(Math.random() * 3) - 1);
                        let dy = Math.round((vy / speed) * moveDist) + (Math.floor(Math.random() * 3) - 1);

                        let nr = cell.r + dy;
                        let nc = cell.c + dx;

                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                            if (grid[nr][nc] === 0) {
                                grid[nr][nc] = cell.type;
                                grid[cell.r][cell.c] = 0;
                            } 
                            else if (grid[nr][nc] > 0 && Math.random() < 0.7) {
                                let temp = grid[nr][nc];
                                grid[nr][nc] = cell.type;
                                grid[cell.r][cell.c] = temp;
                            }
                        }
                    }
                }
            }

            lastCanvasX = canvasX;
            lastCanvasY = canvasY;
        }

        canvas.addEventListener('mousedown', (e) => {
            isInteracting = true;
            const rect = canvas.getBoundingClientRect();
            lastCanvasX = Math.floor(((e.clientX - rect.left) / rect.width) * COLS);
            lastCanvasY = Math.floor(((e.clientY - rect.top) / rect.height) * ROWS);
            applyTouchInfluence(e);
        });
        window.addEventListener('mousemove', (e) => {
            applyTouchInfluence(e);
        });
        window.addEventListener('mouseup', () => {
            isInteracting = false;
            lastCanvasX = null;
            lastCanvasY = null;
        });

        canvas.addEventListener('touchstart', (e) => {
            isInteracting = true;
            if (e.touches && e.touches.length > 0) {
                const rect = canvas.getBoundingClientRect();
                lastCanvasX = Math.floor(((e.touches[0].clientX - rect.left) / rect.width) * COLS);
                lastCanvasY = Math.floor(((e.touches[0].clientY - rect.top) / rect.height) * ROWS);
            }
            applyTouchInfluence(e);
            if (e.cancelable) e.preventDefault(); 
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            applyTouchInfluence(e);
            if (e.cancelable) e.preventDefault();
        }, { passive: false });
        window.addEventListener('touchend', () => {
            isInteracting = false;
            lastCanvasX = null;
            lastCanvasY = null;
        });

        document.getElementById('weightToggleBtn').addEventListener('click', () => {
            weightDifferenceEnabled = !weightDifferenceEnabled;
            document.getElementById('weightToggleBtn').textContent = weightDifferenceEnabled ? "重さ: ON" : "重さ: OFF";
            saveSettings();
        });

        document.getElementById('fpsToggleBtn').addEventListener('click', () => {
            fpsVisible = !fpsVisible;
            document.getElementById('fpsToggleBtn').textContent = fpsVisible ? "FPS: ON" : "FPS: OFF";
            fpsEl.style.display = fpsVisible ? '' : 'none';
            saveSettings();
        });

        document.getElementById('updateBtn').addEventListener('click', async () => {
            if ('serviceWorker' in navigator) {
                const reg = await navigator.serviceWorker.getRegistration();
                if (reg) {
                    await reg.update();
                    if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                }
            }
            window.location.reload(true);
        });

        const modal = document.getElementById('settingsModal');
        document.getElementById('openSettingsBtn').addEventListener('click', () => {
            modal.classList.add('active');
        });
        document.getElementById('closeSettingsBtn').addEventListener('click', () => {
            modal.classList.remove('active');
        });
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });


        function applyBlur() {
            canvas.style.filter = isBlurOn ? "" : "contrast(1.05)";
            document.getElementById('blurToggleBtn').textContent = isBlurOn ? "ボカシ: ON" : "ボカシ: OFF";
        }

        function applyLoadedSettings() {
            applyBlur();
            document.getElementById('weightToggleBtn').textContent = weightDifferenceEnabled ? "重さ: ON" : "重さ: OFF";
            document.getElementById('fpsToggleBtn').textContent = fpsVisible ? "FPS: ON" : "FPS: OFF";
            fpsEl.style.display = fpsVisible ? '' : 'none';
        }

        // ── コイン・広告システム ──────────────────────────
        const COIN_KEY  = 'sandpicture_coins';
        const AD_KEY    = 'sandpicture_ad';
        const AD_LIMIT  = 3;
        const AD_REWARD = 5;

        function getToday() { return new Date().toISOString().slice(0, 10); }

        function loadCoins() {
            return parseInt(localStorage.getItem(COIN_KEY) || '0');
        }
        function saveCoins(n) {
            localStorage.setItem(COIN_KEY, String(n));
            document.getElementById('coin-count').textContent = n;
            document.getElementById('store-coin-count').textContent = n;
        }

        function loadAdState() {
            try {
                const s = JSON.parse(localStorage.getItem(AD_KEY) || '{}');
                if (s.date !== getToday()) return { date: getToday(), count: 0 };
                return s;
            } catch(e) { return { date: getToday(), count: 0 }; }
        }
        function saveAdState(s) { localStorage.setItem(AD_KEY, JSON.stringify(s)); }

        function updateAdBtn() {
            const adState = loadAdState();
            const remaining = AD_LIMIT - adState.count;
            const btn = document.getElementById('adBtn');
            btn.textContent = `広告を見る（残り${remaining}回）`;
            btn.disabled = remaining <= 0;
            btn.style.opacity = remaining <= 0 ? '0.4' : '';
        }

        // 広告モーダル
        const adModal = document.getElementById('adModal');
        document.getElementById('adBtn').addEventListener('click', () => {
            const adState = loadAdState();
            if (adState.count >= AD_LIMIT) return;

            adModal.classList.add('active');
            const countdownEl = document.getElementById('ad-countdown');
            const closeBtn    = document.getElementById('adCloseBtn');
            const rewardMsg   = document.getElementById('ad-reward-msg');
            const adBox       = document.getElementById('ad-placeholder');

            closeBtn.disabled = true;
            closeBtn.textContent = 'しばらくお待ちください';
            rewardMsg.style.display = 'none';
            adBox.style.display = 'flex';
            countdownEl.textContent = '5';

            // ここに広告SDK呼び出しを実装予定
            let sec = 5;
            const timer = setInterval(() => {
                sec--;
                countdownEl.textContent = sec;
                if (sec <= 0) {
                    clearInterval(timer);
                    adBox.style.display = 'none';
                    rewardMsg.style.display = 'block';
                    closeBtn.disabled = false;
                    closeBtn.textContent = '受け取る';

                    adState.count++;
                    saveAdState(adState);
                    saveCoins(loadCoins() + AD_REWARD);
                    updateAdBtn();
                }
            }, 1000);

            closeBtn.onclick = () => {
                clearInterval(timer);
                adModal.classList.remove('active');
                closeBtn.onclick = null;
            };
        });
        adModal.addEventListener('click', e => { if (e.target === adModal) adModal.classList.remove('active'); });

        // ストアデータ
        const STORE_OTHER = {
            bg:   [{ name: '宇宙', price: 50 }, { name: '深海', price: 50 }, { name: '夕暮れ', price: 50 }],
            tank: [{ name: '竹枠', price: 40 }, { name: '金縁', price: 60 }, { name: '丸型', price: 80 }],
            bgm:  [{ name: '瞑想', price: 40 }, { name: '波音', price: 40 }, { name: '雨音', price: 40 }],
        };

        function loadOwnedSands() {
            try { return JSON.parse(localStorage.getItem('sandpicture_owned_sands') || '["desert"]'); }
            catch(e) { return ['desert']; }
        }
        function saveOwnedSands(arr) { localStorage.setItem('sandpicture_owned_sands', JSON.stringify(arr)); }
        function loadActiveSand() { return localStorage.getItem('sandpicture_active_sand') || 'desert'; }

        function swatchGradient(key) {
            const c = SAND_COLORS[key].colors;
            return `linear-gradient(to right, rgb(${c[0]}) 0%, rgb(${c[0]}) 25%, rgb(${c[1]}) 25%, rgb(${c[1]}) 50%, rgb(${c[2]}) 50%, rgb(${c[2]}) 75%, rgb(${c[3]}) 75%)`;
        }

        let currentStoreTab = 'sand';

        function renderStore(tab) {
            currentStoreTab = tab;
            const grid = document.getElementById('store-grid');
            const owned = loadOwnedSands();
            const active = loadActiveSand();

            if (tab === 'sand') {
                grid.innerHTML = Object.entries(SAND_COLORS).map(([key, s]) => {
                    const isOwned  = owned.includes(key);
                    const isActive = active === key;
                    const cls = isActive ? 'store-item active' : isOwned ? 'store-item owned' : 'store-item';
                    const btn = isActive
                        ? `<button disabled style="opacity:0.5;">使用中</button>`
                        : isOwned
                        ? `<button data-buy="${key}" data-owned="1">選択</button>`
                        : `<button data-buy="${key}">🪙 ${s.price}</button>`;
                    return `<div class="${cls}">
                        <div class="item-swatch" style="background:${swatchGradient(key)}"></div>
                        <div>${s.name}</div>
                        ${btn}
                    </div>`;
                }).join('');
            } else {
                grid.innerHTML = STORE_OTHER[tab].map(item => `
                    <div class="store-item">
                        <div style="font-size:11px;color:#3a2e26;margin-bottom:4px;">準備中</div>
                        <div>${item.name}</div>
                        <div class="item-price">${item.price} コイン</div>
                    </div>
                `).join('');
            }

            grid.querySelectorAll('button[data-buy]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const key = btn.dataset.buy;
                    if (btn.dataset.owned) {
                        applySandColors(key);
                        renderStore('sand');
                        return;
                    }
                    const coins = loadCoins();
                    const price = SAND_COLORS[key].price;
                    if (coins < price) { alert('コインが足りません'); return; }
                    saveCoins(coins - price);
                    const owned = loadOwnedSands();
                    owned.push(key);
                    saveOwnedSands(owned);
                    applySandColors(key);
                    renderStore('sand');
                });
            });
        }

        const storeModal = document.getElementById('storeModal');
        document.getElementById('openStoreBtn').addEventListener('click', () => {
            saveCoins(loadCoins());
            renderStore('sand');
            storeModal.classList.add('active');
        });
        document.getElementById('closeStoreBtn').addEventListener('click', () => storeModal.classList.remove('active'));
        storeModal.addEventListener('click', e => { if (e.target === storeModal) storeModal.classList.remove('active'); });

        document.querySelectorAll('.store-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.store-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderStore(btn.dataset.tab);
            });
        });

        // 全画面
        const fsBtn = document.getElementById('fullscreenBtn');
        fsBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
        document.addEventListener('fullscreenchange', () => {
            const isFs = !!document.fullscreenElement;
            document.body.classList.toggle('fs-mode', isFs);
            fsBtn.textContent = isFs ? '✕' : '⛶';
            if (isFs) {
                const scaleX = window.innerWidth  / (document.getElementById('canvas-container').offsetWidth);
                const scaleY = window.innerHeight / (document.getElementById('canvas-container').offsetHeight);
                const scale  = Math.min(scaleX, scaleY) * 0.95;
                document.getElementById('canvas-container').style.transform = `scale(${scale})`;
            } else {
                document.getElementById('canvas-container').style.transform = '';
            }
        });

        // 初期化
        saveCoins(loadCoins());
        updateAdBtn();
        applySandColors(loadActiveSand());
        // ─────────────────────────────────────────────────

        loadSettings();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        setupSimulation();
        initBubbles();
        initSand();
        applyLoadedSettings();
        loop();
    </script>
</body>
